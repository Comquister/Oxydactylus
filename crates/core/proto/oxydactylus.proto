syntax = "proto3";

package oxydactylus.node;

service NodeService {
    rpc StartServer      (ServerStartRequest)     returns (ServerReply);
    rpc StopServer       (ServerStopRequest)      returns (ServerReply);
    rpc DeleteServer     (ServerDeleteRequest)    returns (ServerReply);
    rpc GetStats         (ServerStatsRequest)     returns (ServerStats);
    rpc StreamLogs       (ServerLogsRequest)      returns (stream LogLine);
    rpc SendCommand      (ServerCommandRequest)   returns (ServerReply);
    rpc ProvisionServer  (ServerProvisionRequest) returns (ServerReply);
    rpc ListFiles        (ListFilesRequest)       returns (ListFilesReply);
    rpc GetFileContents  (GetFileContentsRequest) returns (GetFileContentsReply);
    rpc WriteFileContents (WriteFileContentsRequest) returns (ServerReply);
    rpc CreateDirectory  (CreateDirectoryRequest) returns (ServerReply);
    rpc DeleteFiles      (DeleteFilesRequest)     returns (ServerReply);
    rpc RenameFile       (RenameFileRequest)      returns (ServerReply);
    rpc DownloadFile     (DownloadFileRequest)    returns (stream FileChunk);
    rpc UploadFile       (stream FileChunk)       returns (ServerReply);
}

message ServerStartRequest  { string server_id = 1; }
message ServerDeleteRequest { string server_id = 1; }
message ServerStatsRequest  { string server_id = 1; }

message ServerStopRequest {
    string server_id = 1;
    uint32 timeout   = 2;
}

message ServerCommandRequest {
    string server_id = 1;
    string content   = 2;
}

message ServerLogsRequest {
    string server_id = 1;
    bool   follow    = 2;
}

message ServerReply {
    bool   success = 1;
    string message = 2;
}

message ServerStats {
    string server_id    = 1;
    uint64 memory_bytes = 2;
    double cpu_percent  = 3;
    uint64 rx_bytes     = 4;
    uint64 tx_bytes     = 5;
}

message LogLine {
    string content   = 1;
    string stream    = 2;
    int64  timestamp = 3;
}

message ServerProvisionRequest {
    string          server_id   = 1;
    string          image       = 2;
    uint32          memory_mb   = 3;
    uint32          cpu_percent = 4;
    repeated string env         = 5;
    repeated string ports       = 6;
}

message ListFilesRequest {
    string server_id = 1;
    string path      = 2;
}

message FileInfo {
    string name       = 1;
    string path       = 2;
    bool   is_dir     = 3;
    int64  size_bytes = 4;
    string mode       = 5;
}

message ListFilesReply {
    repeated FileInfo files = 1;
}

message GetFileContentsRequest {
    string server_id = 1;
    string path      = 2;
}

message GetFileContentsReply {
    bytes content = 1;
}

message WriteFileContentsRequest {
    string server_id = 1;
    string path      = 2;
    bytes  content   = 3;
}

message CreateDirectoryRequest {
    string server_id = 1;
    string path      = 2;
}

message DeleteFilesRequest {
    string server_id = 1;
    string path      = 2;
    bool   recursive = 3;
}

message RenameFileRequest {
    string server_id = 1;
    string old_path  = 2;
    string new_path  = 3;
}

message DownloadFileRequest {
    string server_id = 1;
    string path      = 2;
    uint32 chunk_size = 3;
}

message FileChunk {
    string server_id = 1;
    string path      = 2;
    bytes  chunk     = 3;
}
